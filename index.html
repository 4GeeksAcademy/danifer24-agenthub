<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AgentHub - Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#b7c8e1",
                        "surface": "#faf8ff",
                        "surface-container-highest": "#dae2fd",
                        "surface-container-low": "#f2f3ff",
                        "surface-container-high": "#e2e7ff",
                        "surface-tint": "#0053db",
                        "on-tertiary-container": "#eff1f3",
                        "surface-container": "#eaedff",
                        "surface-dim": "#d2d9f4",
                        "secondary-fixed": "#d3e4fe",
                        "on-surface-variant": "#434655",
                        "primary-fixed-dim": "#b4c5ff",
                        "primary": "#004ac6",
                        "outline-variant": "#c3c6d7",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "primary-container": "#2563eb",
                        "tertiary-fixed": "#e0e3e5",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-bright": "#faf8ff",
                        "on-secondary": "#ffffff",
                        "tertiary": "#525657",
                        "inverse-on-surface": "#eef0ff",
                        "on-secondary-container": "#54647a",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#444749",
                        "inverse-primary": "#b4c5ff",
                        "secondary-container": "#d0e1fb",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "secondary": "#505f76",
                        "on-primary-container": "#eeefff",
                        "on-secondary-fixed-variant": "#38485d",
                        "surface-variant": "#dae2fd",
                        "on-tertiary-fixed": "#191c1e",
                        "error-container": "#ffdad6",
                        "background": "#faf8ff",
                        "outline": "#737686",
                        "inverse-surface": "#283044",
                        "on-background": "#131b2e",
                        "tertiary-container": "#6b6e70",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed": "#00174b",
                        "on-primary": "#ffffff",
                        "on-surface": "#131b2e",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#0b1c30",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "margin": "24px",
                        "gutter": "20px",
                        "sm": "8px",
                        "xl": "32px",
                        "base": "4px",
                        "sidebar_collapsed": "64px",
                        "xs": "4px",
                        "sidebar_width": "260px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "mono": ["monospace"],
                        "h1": ["Inter"],
                        "h2": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h3": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "mono": ["13px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "h1": ["30px", { "lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "h3": ["20px", { "lineHeight": "28px", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen">
    <!-- SideNavBar -->
    <aside
        class="fixed left-0 top-0 h-screen w-[280px] border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 z-50 flex flex-col py-6">
        <div class="px-6 mb-8 flex items-center gap-3">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
                <span class="material-symbols-outlined text-md">smart_toy</span>
            </div>
            <div>
                <h1 class="text-lg font-black text-slate-900 dark:text-white leading-tight">AgentHub</h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Orchestration Layer</p>
            </div>
        </div>

        <nav class="flex-1 space-y-1 px-3">
            <a class="js-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 text-blue-600 dark:text-blue-400 bg-blue-50/50 dark:bg-blue-900/20 border-r-2 border-blue-600"
                data-section="dashboard" href="#">
                <span class="material-symbols-outlined">dashboard</span><span
                    class="text-sm font-medium">Dashboard</span>
            </a>
            <a class="js-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50"
                data-section="users" href="#">
                <span class="material-symbols-outlined">group</span><span class="text-sm font-medium">Users</span>
            </a>
            <a class="js-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50"
                data-section="agents" href="#">
                <span class="material-symbols-outlined">smart_toy</span><span class="text-sm font-medium">Agents</span>
            </a>
            <a class="js-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50"
                data-section="skills" href="#">
                <span class="material-symbols-outlined">psychology</span><span class="text-sm font-medium">Skills</span>
            </a>
            <a class="js-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50"
                data-section="contracts" href="#">
                <span class="material-symbols-outlined">description</span><span
                    class="text-sm font-medium">Contracts</span>
            </a>
            <a class="js-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50"
                data-section="errors" href="#">
                <span class="material-symbols-outlined">terminal</span><span class="text-sm font-medium">Error
                    Logs</span>
            </a>
        </nav>
    </aside>

    <main class="ml-[280px] min-h-screen">
        <header
            class="fixed top-0 right-0 left-[280px] z-40 flex items-center justify-between px-6 h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 shadow-sm">
            <div class="flex items-center bg-slate-100 dark:bg-slate-800 px-3 py-1.5 rounded-lg w-96">
                <span class="material-symbols-outlined text-slate-400 text-sm mr-2">search</span>
                <input
                    class="bg-transparent border-none focus:ring-0 text-sm text-slate-900 dark:text-white w-full placeholder:text-slate-400"
                    placeholder="Search..." type="text" />
            </div>
            <button
                class="p-2 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 transition-colors"
                id="theme-toggle" aria-label="Cambiar tema">
                <span class="material-symbols-outlined">dark_mode</span>
            </button>
        </header>

        <div class="pt-24 px-lg pb-lg">
            <section id="section-content"></section>
        </div>
    </main>

    <script src="./app.js"></script>
</body>

</html>
